name: Build And Publish Docker Image

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Ensure Bun lockfile exists for Docker build context
        run: |
          if [ ! -f bun.lock ] && [ ! -f bun.lockb ]; then
            echo "No bun lockfile found. Generating ephemeral lockfile for CI..."
            bun install --lockfile-only || bun install --no-save
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v6
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          file: ./Dockerfile.bun
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DIRECT_URL=${{ secrets.DIRECT_URL != '' && secrets.DIRECT_URL || 'postgresql://postgres:postgres@localhost:5432/postgres?schema=public' }}
            DATABASE_URL=${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/postgres?schema=public' }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY != '' && secrets.OPENAI_API_KEY || 'build-placeholder-openai-key' }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY != '' && secrets.STRIPE_SECRET_KEY || 'sk_test_build_placeholder' }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY != '' && secrets.RESEND_API_KEY || 're_build_placeholder' }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN != '' && secrets.GITHUB_TOKEN || 'ghp_build_placeholder' }}

  deploy-dokploy:
    name: Trigger Dokploy Deploy
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Dokploy webhook
        env:
          DOKPLOY_DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
        run: |
          set -euo pipefail

          if [ -z "${DOKPLOY_DEPLOY_WEBHOOK:-}" ]; then
            echo "::error::Missing DOKPLOY_DEPLOY_WEBHOOK secret in repository settings."
            exit 1
          fi

          echo "Triggering Dokploy deployment webhook..."

          # Try POST first (common webhook pattern), then fallback to GET.
          if curl --fail --show-error --silent --location \
            --max-time 30 \
            --retry 3 \
            --retry-delay 3 \
            --retry-all-errors \
            -X POST "${DOKPLOY_DEPLOY_WEBHOOK}"; then
            echo "Dokploy webhook accepted via POST."
            exit 0
          fi

          echo "POST failed, trying GET..."
          curl --fail --show-error --silent --location \
            --max-time 30 \
            --retry 3 \
            --retry-delay 3 \
            --retry-all-errors \
            "${DOKPLOY_DEPLOY_WEBHOOK}"
          echo "Dokploy webhook accepted via GET."
