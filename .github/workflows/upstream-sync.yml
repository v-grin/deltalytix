name: Upstream Sync Check

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and origin
        run: |
          git remote add upstream https://github.com/hugodemenez/deltalytix.git
          git fetch upstream main
          git fetch origin main

      - name: Skip when no upstream updates
        id: compare
        run: |
          set -euo pipefail
          UPSTREAM_SHA="$(git rev-parse upstream/main)"
          ORIGIN_SHA="$(git rev-parse origin/main)"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "origin_sha=$ORIGIN_SHA" >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_SHA" = "$ORIGIN_SHA" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: steps.compare.outputs.has_updates == 'true'
        run: |
          set -euo pipefail
          git checkout -B sync/upstream-main upstream/main
          git push --force origin sync/upstream-main

      - name: Create or update pull request
        if: steps.compare.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:sync/upstream-main`;
            const base = "main";

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
              per_page: 100
            });

            if (prs.length > 0) {
              core.info(`Open sync PR already exists: #${prs[0].number}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              head: "sync/upstream-main",
              base,
              title: "chore: sync with upstream/main",
              body: [
                "Automated PR created by `upstream-sync.yml`.",
                "",
                "This means the upstream repository has new commits in `main`.",
                "Review and merge when ready."
              ].join("\n")
            });

            core.info(`Created PR #${pr.data.number}: ${pr.data.html_url}`);
